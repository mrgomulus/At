version: '3.8'\n\nservices:\n  backend:\n    build:\n      context: ./backend\n      dockerfile: Dockerfile\n    volumes:\n      - ./backend:/app\n    ports:\n      - "5000:5000"\n    environment:\n      - DATABASE_URL=mysql://user:password@db:3306/dbname\n\n  frontend:\n    build:\n      context: ./frontend\n      dockerfile: Dockerfile\n    volumes:\n      - ./frontend:/app\n    ports:\n      - "3000:3000"\n\n  ollama-ai:\n    image: ollama/ollama:latest\n    ports:\n      - "8080:8080"\n\n  nginx:\n    image: nginx:latest\n    ports:\n      - "80:80"\n    volumes:\n      - ./nginx.conf:/etc/nginx/nginx.conf\n    depends_on:\n      - backend\n      - frontend\n\n  db:\n    image: mysql:latest\n    environment:\n      MYSQL_ROOT_PASSWORD: password\n      MYSQL_DATABASE: dbname\n      MYSQL_USER: user\n      MYSQL_PASSWORD: password\n    volumes:\n      - db_data:/var/lib/mysql\n\nvolumes:\n  db_data: